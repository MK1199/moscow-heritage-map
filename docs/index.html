<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moscow Heritage Map — ОКН ЦАО</title>
    <meta name="description" content="Интерактивная карта объектов культурного наследия Центрального административного округа Москвы">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --federal: #1A3A5C;
            --regional: #3D7ABF;
            --federal-light: rgba(26, 58, 92, 0.15);
            --regional-light: rgba(61, 122, 191, 0.15);
            --bg: #F5F4F0;
            --text: #1a1a1a;
            --text-muted: #6b6b6b;
            --border: #d4d2cc;
            --white: #fff;
            --font: 'JetBrains Mono', monospace;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
        }

        /* ── HEADER ── */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            background: var(--federal);
            color: var(--white);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 48px;
        }

        .header-title {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .header-subtitle {
            font-size: 10px;
            font-weight: 400;
            opacity: 0.7;
            letter-spacing: 0.3px;
        }

        .header-stats {
            font-size: 10px;
            opacity: 0.7;
        }

        /* ── MAP ── */
        #map {
            position: fixed;
            top: 48px;
            left: 0;
            right: 0;
            bottom: 0;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            position: fixed;
            top: 48px;
            left: 0;
            width: 300px;
            bottom: 0;
            background: var(--white);
            border-right: 1px solid var(--border);
            z-index: 5;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }

        .sidebar.collapsed {
            transform: translateX(-300px);
        }

        .sidebar-toggle {
            position: fixed;
            top: 58px;
            left: 300px;
            z-index: 6;
            background: var(--white);
            border: 1px solid var(--border);
            border-left: none;
            padding: 8px 6px;
            cursor: pointer;
            font-family: var(--font);
            font-size: 12px;
            border-radius: 0 4px 4px 0;
            transition: left 0.3s ease;
        }

        .sidebar.collapsed ~ .sidebar-toggle {
            left: 0;
        }

        .sidebar-section {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-section:last-child {
            border-bottom: none;
        }

        .section-label {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        /* ── LEGEND ── */
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 3px;
            transition: background 0.15s;
            font-size: 12px;
        }

        .legend-item:hover {
            background: var(--bg);
        }

        .legend-item.inactive {
            opacity: 0.35;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 2px;
            flex-shrink: 0;
        }

        .legend-count {
            margin-left: auto;
            font-size: 10px;
            color: var(--text-muted);
        }

        /* ── DISTRICT FILTER ── */
        .district-list {
            max-height: 260px;
            overflow-y: auto;
        }

        .district-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 5px 6px;
            cursor: pointer;
            border-radius: 3px;
            font-size: 11px;
            transition: background 0.15s;
        }

        .district-item:hover {
            background: var(--bg);
        }

        .district-item.active {
            background: var(--federal-light);
            font-weight: 600;
        }

        .district-count {
            font-size: 10px;
            color: var(--text-muted);
        }

        /* ── LAYER TOGGLE ── */
        .layer-toggles {
            display: flex;
            gap: 6px;
        }

        .layer-btn {
            flex: 1;
            padding: 6px;
            border: 1px solid var(--border);
            background: var(--white);
            cursor: pointer;
            font-family: var(--font);
            font-size: 10px;
            text-align: center;
            border-radius: 3px;
            transition: all 0.15s;
        }

        .layer-btn.active {
            background: var(--federal);
            color: var(--white);
            border-color: var(--federal);
        }

        /* ── POPUP ── */
        .mapboxgl-popup-content {
            font-family: var(--font) !important;
            padding: 0 !important;
            border-radius: 4px !important;
            overflow: hidden;
            max-width: 320px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15) !important;
        }

        .mapboxgl-popup-close-button {
            font-size: 18px;
            padding: 4px 8px;
            color: var(--white);
            z-index: 1;
        }

        .popup-card {
            width: 300px;
        }

        .popup-header {
            padding: 12px 14px;
            color: var(--white);
            font-size: 12px;
            font-weight: 600;
            line-height: 1.4;
        }

        .popup-header.federal { background: var(--federal); }
        .popup-header.regional { background: var(--regional); }

        .popup-body {
            padding: 12px 14px;
        }

        .popup-row {
            display: flex;
            margin-bottom: 6px;
            font-size: 11px;
            line-height: 1.4;
        }

        .popup-label {
            color: var(--text-muted);
            width: 70px;
            flex-shrink: 0;
        }

        .popup-value {
            color: var(--text);
        }

        .popup-panorama {
            display: block;
            margin-top: 8px;
            font-size: 10px;
            color: var(--regional);
            text-decoration: none;
        }

        .popup-panorama:hover {
            text-decoration: underline;
        }

        /* ── VISIBLE COUNT ── */
        .visible-count {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--white);
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: 20px;
            font-family: var(--font);
            font-size: 11px;
            color: var(--text-muted);
            z-index: 5;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        /* ── MOBILE ── */
        @media (max-width: 768px) {
            .sidebar {
                top: auto;
                bottom: 0;
                left: 0;
                right: 0;
                width: 100%;
                height: auto;
                max-height: 45vh;
                border-right: none;
                border-top: 1px solid var(--border);
                border-radius: 12px 12px 0 0;
                transform: translateY(calc(100% - 44px));
                transition: transform 0.3s ease;
            }

            .sidebar.expanded {
                transform: translateY(0);
            }

            .sidebar.collapsed {
                transform: translateY(calc(100% - 44px));
            }

            .sidebar-toggle { display: none; }

            .mobile-handle {
                display: flex;
                justify-content: center;
                padding: 10px;
                cursor: pointer;
            }

            .mobile-handle-bar {
                width: 36px;
                height: 4px;
                background: var(--border);
                border-radius: 2px;
            }

            #map { left: 0; }

            .visible-count {
                bottom: 55px;
            }
        }

        @media (min-width: 769px) {
            #map { left: 300px; }
            .sidebar.collapsed ~ #map { left: 0; }
            .mobile-handle { display: none; }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <div>
            <div class="header-title">Moscow Heritage Map</div>
            <div class="header-subtitle">Объекты культурного наследия ЦАО</div>
        </div>
        <div class="header-stats" id="header-stats"></div>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <div class="mobile-handle" id="mobile-handle">
            <div class="mobile-handle-bar"></div>
        </div>

        <!-- Layer toggle -->
        <div class="sidebar-section">
            <div class="section-label">Слой</div>
            <div class="layer-toggles">
                <button class="layer-btn active" data-layer="buildings" onclick="switchLayer('buildings')">Здания</button>
                <button class="layer-btn" data-layer="heatmap" onclick="switchLayer('heatmap')">Плотность</button>
            </div>
        </div>

        <!-- Legend / category filter -->
        <div class="sidebar-section">
            <div class="section-label">Категория охраны</div>
            <div class="legend-item" data-cat="Федеральный" onclick="toggleCategory('Федеральный')">
                <div class="legend-dot" style="background:#1A3A5C"></div>
                <span>Федеральный</span>
                <span class="legend-count" id="count-federal">—</span>
            </div>
            <div class="legend-item" data-cat="Региональный" onclick="toggleCategory('Региональный')">
                <div class="legend-dot" style="background:#3D7ABF"></div>
                <span>Региональный</span>
                <span class="legend-count" id="count-regional">—</span>
            </div>
        </div>

        <!-- District filter -->
        <div class="sidebar-section" style="flex:1; overflow:hidden;">
            <div class="section-label">Район <span id="district-reset" style="float:right; cursor:pointer; color:var(--regional); display:none;" onclick="resetDistrict()">сбросить</span></div>
            <div class="district-list" id="district-list"></div>
        </div>
    </div>

    <button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()">◀</button>

    <!-- MAP -->
    <div id="map"></div>

    <!-- VISIBLE COUNT -->
    <div class="visible-count" id="visible-count"></div>

    <script>
        // ── CONFIG ──
        mapboxgl.accessToken = 'YOUR_MAPBOX_TOKEN_HERE';

        const COLORS = {
            'Федеральный': '#1A3A5C',
            'Региональный': '#3D7ABF'
        };

        // ── STATE ──
        let activeCategories = new Set(['Федеральный', 'Региональный']);
        let activeDistrict = null;
        let currentLayer = 'buildings';
        let allData = null;

        // district counts (will be populated from data)
        const districtCounts = {};

        // ── MAP INIT ──
        const map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/light-v11',
            center: [37.62, 55.755],
            zoom: 12.3,
            minZoom: 10,
            maxZoom: 18
        });

        map.addControl(new mapboxgl.NavigationControl(), 'top-right');

        map.on('load', () => {
            // ── POLYGONS SOURCE ──
            map.addSource('buildings', {
                type: 'geojson',
                data: 'data/okn-cao-polygons.geojson'
            });

            // ── POINTS SOURCE (for heatmap + clusters) ──
            map.addSource('points', {
                type: 'geojson',
                data: 'data/okn-cao-points.geojson'
            });

            // ── BUILDING FILL LAYER ──
            map.addLayer({
                id: 'buildings-fill',
                type: 'fill',
                source: 'buildings',
                paint: {
                    'fill-color': [
                        'match', ['get', 'category_label'],
                        'Федеральный', COLORS['Федеральный'],
                        'Региональный', COLORS['Региональный'],
                        '#999'
                    ],
                    'fill-opacity': 0.75
                }
            });

            // ── BUILDING OUTLINE ──
            map.addLayer({
                id: 'buildings-outline',
                type: 'line',
                source: 'buildings',
                paint: {
                    'line-color': '#ffffff',
                    'line-width': [
                        'interpolate', ['linear'], ['zoom'],
                        12, 0,
                        14, 0.3,
                        16, 1
                    ]
                }
            });

            // ── BUILDING HIGHLIGHT (hover) ──
            map.addLayer({
                id: 'buildings-highlight',
                type: 'line',
                source: 'buildings',
                paint: {
                    'line-color': '#FFD700',
                    'line-width': 2.5
                },
                filter: ['==', 'global_id', '']
            });

            // ── HEATMAP LAYER (hidden by default) ──
            map.addLayer({
                id: 'heatmap-layer',
                type: 'heatmap',
                source: 'points',
                layout: { 'visibility': 'none' },
                paint: {
                    'heatmap-weight': 1,
                    'heatmap-intensity': [
                        'interpolate', ['linear'], ['zoom'],
                        10, 0.5, 14, 2
                    ],
                    'heatmap-radius': [
                        'interpolate', ['linear'], ['zoom'],
                        10, 15, 14, 30
                    ],
                    'heatmap-color': [
                        'interpolate', ['linear'], ['heatmap-density'],
                        0, 'rgba(61,122,191,0)',
                        0.2, 'rgba(139,189,224,0.5)',
                        0.4, 'rgba(61,122,191,0.6)',
                        0.6, 'rgba(26,58,92,0.7)',
                        0.8, 'rgba(26,58,92,0.85)',
                        1, 'rgba(10,25,50,0.95)'
                    ],
                    'heatmap-opacity': 0.8
                }
            });

            // ── INTERACTIONS ──
            map.on('click', 'buildings-fill', (e) => {
                if (!e.features.length) return;
                const p = e.features[0].properties;
                const coords = e.lngLat;

                const catClass = p.category_label === 'Федеральный' ? 'federal' : 'regional';
                const name = p.name_short || p.name;
                const epochStr = p.epoch && p.epoch !== 'null' ? p.epoch : '';
                const yearStr = p.earliest_year && p.earliest_year !== 'null' 
                    ? `≈ ${Math.round(p.earliest_year)} г.` : '';

                const panoramaUrl = `https://yandex.ru/maps/?ll=${p.lon},${p.lat}&z=17&panorama%5Bpoint%5D=${p.lon},${p.lat}&panorama%5Bdirection%5D=0,0`;

                new mapboxgl.Popup({ maxWidth: '320px' })
                    .setLngLat(coords)
                    .setHTML(`
                        <div class="popup-card">
                            <div class="popup-header ${catClass}">
                                ${name.length > 80 ? name.slice(0, 80) + '…' : name}
                            </div>
                            <div class="popup-body">
                                <div class="popup-row">
                                    <span class="popup-label">Адрес</span>
                                    <span class="popup-value">${p.address}</span>
                                </div>
                                <div class="popup-row">
                                    <span class="popup-label">Категория</span>
                                    <span class="popup-value">${p.category_label}</span>
                                </div>
                                <div class="popup-row">
                                    <span class="popup-label">Район</span>
                                    <span class="popup-value">${p.district}</span>
                                </div>
                                ${epochStr ? `<div class="popup-row">
                                    <span class="popup-label">Эпоха</span>
                                    <span class="popup-value">${epochStr} ${yearStr}</span>
                                </div>` : ''}
                                <a class="popup-panorama" href="${panoramaUrl}" target="_blank" rel="noopener">
                                    → Панорама улицы (Яндекс)
                                </a>
                            </div>
                        </div>
                    `)
                    .addTo(map);
            });

            // hover highlight
            let hoveredId = null;
            map.on('mousemove', 'buildings-fill', (e) => {
                map.getCanvas().style.cursor = 'pointer';
                if (e.features.length > 0) {
                    const gid = e.features[0].properties.global_id;
                    if (hoveredId !== gid) {
                        hoveredId = gid;
                        map.setFilter('buildings-highlight', ['==', 'global_id', gid]);
                    }
                }
            });
            map.on('mouseleave', 'buildings-fill', () => {
                map.getCanvas().style.cursor = '';
                hoveredId = null;
                map.setFilter('buildings-highlight', ['==', 'global_id', '']);
            });

            // ── LOAD DATA FOR SIDEBAR COUNTS ──
            fetch('data/okn-cao-points.geojson')
                .then(r => r.json())
                .then(data => {
                    allData = data;
                    buildDistrictList(data);
                    updateCounts(data);
                    updateHeaderStats(data);
                });
        });

        // ── FILTER LOGIC ──
        function buildFilter() {
            const conditions = ['all'];

            // category filter
            if (activeCategories.size < 2) {
                const cat = [...activeCategories][0];
                conditions.push(['==', ['get', 'category_label'], cat]);
            } else if (activeCategories.size === 0) {
                conditions.push(['==', ['get', 'category_label'], '__none__']);
            }

            // district filter
            if (activeDistrict) {
                conditions.push(['==', ['get', 'district'], activeDistrict]);
            }

            return conditions.length > 1 ? conditions : null;
        }

        function applyFilters() {
            const filter = buildFilter();
            map.setFilter('buildings-fill', filter);
            map.setFilter('buildings-outline', filter);
            map.setFilter('heatmap-layer', filter);

            if (allData) updateCounts(allData);
        }

        // ── CATEGORY TOGGLE ──
        function toggleCategory(cat) {
            if (activeCategories.has(cat)) {
                if (activeCategories.size === 1) return; // нельзя убрать последний
                activeCategories.delete(cat);
            } else {
                activeCategories.add(cat);
            }

            document.querySelectorAll('.legend-item').forEach(el => {
                const c = el.dataset.cat;
                el.classList.toggle('inactive', !activeCategories.has(c));
            });

            applyFilters();
        }

        // ── DISTRICT FILTER ──
        function buildDistrictList(data) {
            const counts = {};
            data.features.forEach(f => {
                const d = f.properties.district;
                counts[d] = (counts[d] || 0) + 1;
            });

            const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
            const list = document.getElementById('district-list');

            sorted.forEach(([district, count]) => {
                districtCounts[district] = count;
                const el = document.createElement('div');
                el.className = 'district-item';
                el.dataset.district = district;
                el.innerHTML = `<span>${district}</span><span class="district-count">${count}</span>`;
                el.onclick = () => selectDistrict(district);
                list.appendChild(el);
            });
        }

        function selectDistrict(district) {
            if (activeDistrict === district) {
                resetDistrict();
                return;
            }

            activeDistrict = district;
            document.querySelectorAll('.district-item').forEach(el => {
                el.classList.toggle('active', el.dataset.district === district);
            });
            document.getElementById('district-reset').style.display = 'inline';

            applyFilters();

            // fly to district bounds
            if (allData) {
                const features = allData.features.filter(f => f.properties.district === district);
                if (features.length) {
                    const lons = features.map(f => f.geometry.coordinates[0]);
                    const lats = features.map(f => f.geometry.coordinates[1]);
                    map.fitBounds([
                        [Math.min(...lons) - 0.005, Math.min(...lats) - 0.003],
                        [Math.max(...lons) + 0.005, Math.max(...lats) + 0.003]
                    ], { padding: 60, duration: 800 });
                }
            }
        }

        function resetDistrict() {
            activeDistrict = null;
            document.querySelectorAll('.district-item').forEach(el => el.classList.remove('active'));
            document.getElementById('district-reset').style.display = 'none';
            applyFilters();
            map.flyTo({ center: [37.62, 55.755], zoom: 12.3, duration: 800 });
        }

        // ── LAYER SWITCH ──
        function switchLayer(layer) {
            currentLayer = layer;
            document.querySelectorAll('.layer-btn').forEach(el => {
                el.classList.toggle('active', el.dataset.layer === layer);
            });

            if (layer === 'buildings') {
                map.setLayoutProperty('buildings-fill', 'visibility', 'visible');
                map.setLayoutProperty('buildings-outline', 'visibility', 'visible');
                map.setLayoutProperty('heatmap-layer', 'visibility', 'none');
            } else {
                map.setLayoutProperty('buildings-fill', 'visibility', 'none');
                map.setLayoutProperty('buildings-outline', 'visibility', 'none');
                map.setLayoutProperty('heatmap-layer', 'visibility', 'visible');
            }
        }

        // ── COUNTS ──
        function updateCounts(data) {
            let visible = data.features.filter(f => {
                const p = f.properties;
                if (!activeCategories.has(p.category_label)) return false;
                if (activeDistrict && p.district !== activeDistrict) return false;
                return true;
            });

            const federal = visible.filter(f => f.properties.category_label === 'Федеральный').length;
            const regional = visible.filter(f => f.properties.category_label === 'Региональный').length;

            document.getElementById('count-federal').textContent = federal;
            document.getElementById('count-regional').textContent = regional;
            document.getElementById('visible-count').textContent = `${visible.length} из ${data.features.length} зданий`;
        }

        function updateHeaderStats(data) {
            document.getElementById('header-stats').textContent = 
                `${data.features.length} зданий · data.mos.ru`;
        }

        // ── SIDEBAR TOGGLE ──
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const btn = document.getElementById('sidebar-toggle');
            sidebar.classList.toggle('collapsed');
            btn.textContent = sidebar.classList.contains('collapsed') ? '▶' : '◀';

            // trigger map resize after animation
            setTimeout(() => map.resize(), 310);
        }

        // ── MOBILE HANDLE ──
        document.getElementById('mobile-handle')?.addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('expanded');
        });
    </script>
</body>
</html>
